name: Deploy OTel Collector Stack

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 确保项目目录存在（首次部署时 clone）
            PROJECT_DIR="/home/deploy/projects/otel-collector-stack"
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "🔧 First deployment: cloning repository..."
              git clone https://github.com/nanlindev/otel-collector-stack.git "$PROJECT_DIR"
            fi
            cd "$PROJECT_DIR"

            # 2. 拉取最新代码
            echo "📦 Pulling latest code..."
            git pull origin main

            # 3. 写入 .env 文件（每次都覆盖确保最新密钥）
            echo "🔑 Writing .env file..."
            cat > .env << 'EOF'
            LANGFUSE_PUBLIC_KEY=${{ secrets.LANGFUSE_PUBLIC_KEY }}
            LANGFUSE_SECRET_KEY=${{ secrets.LANGFUSE_SECRET_KEY }}
            AUTHORIZATION=${{ secrets.AUTHORIZATION }}
            EOF
            chmod 600 .env

            # 4. 确保外部网络存在
            echo "🌐 Ensuring proxy_network exists..."
            docker network create proxy_network --driver bridge 2>/dev/null || true

            # 5. 拉取最新镜像并启动容器
            echo "🚀 Deploying OTel Collector..."
            docker compose pull
            docker compose up -d

            # 6. 清理旧镜像
            echo "🧹 Cleaning up unused images..."
            docker image prune -f

            echo "✅ Deployment complete!"